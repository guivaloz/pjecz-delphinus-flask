services:
  postgres:
    image: postgres:18-alpine
    container_name: pjecz_delphinus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRESQL_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pjecz_delphinus_flask
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:5000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
